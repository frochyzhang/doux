spring:
  application:
    name: dev-ccp
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  pid:
    file: ${spring.application.name}.pid

com:
  alipay:
    sofa:
      rpc:
        registry-address: nacos://10.250.28.142:8848/public
        bolt-port: 12222
  allinfinance:
    rpc:
      provider:
        service-package: com.allinfinance.dev.ccp.service

dev:
  ccp:
    driver: okhttp
    file:
      local-path: C:\\temp

