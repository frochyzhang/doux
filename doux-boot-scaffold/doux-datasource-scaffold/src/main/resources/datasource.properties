doux.datasource.type=com.alibaba.druid.pool.DruidDataSource
#============================druid's configuration======================================
doux.datasource.druid.initial-size=5
doux.datasource.druid.min-idle=5
doux.datasource.druid.max-active=20
doux.datasource.druid.max-wait=60000
doux.datasource.druid.time-between-eviction-runs-millis=60000
doux.datasource.druid.min-evictable-idle-time-millis=300000
doux.datasource.druid.validation-query=SELECT 1
doux.datasource.druid.test-while-idle=true
doux.datasource.druid.test-on-borrow=false
doux.datasource.druid.test-on-return=false
doux.datasource.druid.pool-prepared-statements=true
doux.datasource.druid.max-pool-prepared-statement-per-connection-size=20
doux.datasource.druid.filters=stat,wall
doux.datasource.druid.use-global-data-source-stat=true
doux.datasource.druid.connect-properties=druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
doux.datasource.druid.stat.stat-view-servlet.login-username=admin
doux.datasource.druid.stat.stat-view-servlet.login-password=123456
doux.datasource.druid.stat.stat-view-servlet.reset-enable=false
doux.datasource.druid.stat.stat-view-servlet.url-pattern=/druid/*
doux.datasource.druid.stat.web-stat-filter.url-pattern=/*
doux.datasource.druid.stat.web-stat-filter.exclusions=*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*
#============================mybatis's configuration======================================
doux.datasource.mybatis.mapper-locations=classpath*:/mapper/*Mapper.xml
#============================encryption configuration======================================
doux.datasource.encrypt.encrypted=false
doux.datasource.transaction.enabled=true