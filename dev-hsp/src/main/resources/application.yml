spring:
  application:
    name: dev-hsp
  profiles:
    active: dev

---
spring:
  profiles: dev

com:
  alipay:
    sofa:
      rpc:
        registry-address: nacos://10.250.28.142:8848/public
        bolt-port: 12202
  allinfinance:
    rpc:
      provider-package: com.allinfinance.dev.hsp.service
    connection:
      pool:
        connection-driver: hsp
        connection-pool-type: pool
        ping-service: default
      scaffold:
        server-metadata-map:
          server-1:
            server-ip: 10.250.28.239
            server-port: 6666
            max-active-connections: 50
            ping-enabled: false
            ping-query-content: "00"
            ping-verify-message: ""
            length-field: 2
            buffer-size: 65536
            default-network-timeout: 5000
          server-2:
            server-ip: 10.250.28.239
            server-port: 6666
            ping-enabled: false
            ping-query-content: "00"
            ping-verify-message: ""
            length-field: 2
            buffer-size: 65536
            default-network-timeout: 5000

