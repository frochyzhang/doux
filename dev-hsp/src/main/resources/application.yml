spring:
  application:
    name: dev-hsp
  profiles:
    active: dev

---
spring:
  profiles: dev

com:
  alipay:
    sofa:
      rpc:
        registry-address: nacos://10.250.28.142:8848/public-hhf
        bolt-port: 12202
  allinfinance:
    rpc:
      provider-package: com.allinfinance.dev.hsp.service
    connection:
      pool-type: queue
      buffer-size: 65536
      length-field: 2
      server-metadata-map:
        server-1:
          server-name: "加密机1号"
          server-ip: 10.252.64.45
          server-port: 9001
          timeout: 200
          checkout-time: 3000
          retry-times: 3
          max-active-connection: 10
          max-idle-connection: 5
          enable-ping: true
          ping-query-message: "3132333435"
          ping-verify-message: ""

