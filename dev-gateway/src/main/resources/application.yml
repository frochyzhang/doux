spring:
  application:
    name: dev-gateway
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  pid:
    file: ${spring.application.name}.pid

com:
  allinfinance:
    gateway:
      data-path: C:\Users\huanghf\Desktop\jiuzaizhelijian1
      server-addr: 127.0.0.1:8081
      cluster-group-id: gateway
      cluster-addr: 127.0.0.1:8081
  alipay:
    sofa:
      rpc:
        registry-address: nacos://10.250.28.142:8848/public-dev
        bolt-port: 12404
        consumer-repeated-reference-limit: 100

dev:
  gateway:
    retries: 100
    interval: 200
    exporter-list: jcfp-exporter, acfp-exporter
