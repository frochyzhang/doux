spring:
  application:
    name: dev-gateway
  profiles:
    active: dev

---
spring:
  profiles: dev

com:
  allinfinance:
    rpc:
      provider-package: com.allinfinance.dev.gateway.service
  alipay:
    sofa:
      rpc:
        registry-address: nacos://10.250.28.142:8848/public-yc
        bolt-port: 12404
        consumer-repeated-reference-limit: 100

dev:
  gateway:
    retries: 100
    interval: 200
